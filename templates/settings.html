{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}

<style>
    .dashboard-main {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 16px;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    .settings-card {
        width: 100%;
        background: #2a2a2a;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.35);
        margin-top: 20px;
    }
    .email {
        margin: 15px 0;
        font-size: 16px;
        opacity: 0.85;
        word-break: break-word;
    }
    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 14px;
        border-radius: 6px;
        background: #39ffde;
        color: #111;
        font-weight: bold;
        text-decoration: none;
        border: none;
        cursor: pointer;
    }
    .btn:hover {
        background: #2de0c4;
    }

    h1 {
        margin-bottom: 10px;
    }
    @media (max-width: 600px) {
        .settings-card {
            padding: 18px;
        }
    }
</style>
<div class="dashboard-main">
    <h1>Settings</h1>
    <div class="settings-card">
        <div class="email">
            <strong>Email:</strong> {{ session.get('email') }}
        </div>
        <a href="{{ url_for('change_password') }}" class="btn">
            Change Password
        </a>
    </div>
</div>
{% endblock %}
