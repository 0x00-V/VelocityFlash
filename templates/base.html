<!doctype html>
<html>
<head>
    <title>{% block title %}{% endblock %} | VelocityFlash</title>
</head>
<body>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
        background-color: #222;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
        nav{
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .nav-links{
            display: flex;
            align-items: center;
            list-style: none;
        }
        .nav-links a{
            display: block;
            padding: 30px 16px;
            color: white;
            text-decoration: none;
            font-size: 16px;;
            text-transform: uppercase;
            transition: all ease-in-out 100ms;
        }
        .nav-links a:hover{
            background-color: red;
        }
        .nav-links .nav-cta-button{
            padding: 10px;
            margin-left: 16px;
            border: red solid 2px;
            border-radius: 50px;
        }
        .nav-links .nav-cta-button:hover{
            background-color: red;
        }
        .logo{
            display: flex;
            align-items: center;
        }
        .logo img{
            width: 40px;
        }
        .logo h3{
            margin-left: 10px;
            color: #111;
            text-decoration: none;
            font-size: 28px;
        }
        .hamburger{
            display: none;
            cursor: pointer;
            width: 34px;
        }
        .hamburger .bar{
            flex-basis: 100%;
            height: 4px;
            background-color: white;
            margin: 3px;
        }

        .main-content {
        flex: 1;
        padding: 20px;
        }

        @media (max-width: 768px)
        {
            nav{
                flex-wrap: wrap;
            }
            .hamburger{
                display: flex;
                flex-wrap: wrap;
            }
            .logo{
                height: 80px;
            }
            .nav-links{
                display: none;
                flex-basis: 100%;
                flex-wrap: wrap;
            }
            .nav-links li{
                flex-basis: 100%;
            }
            .nav-links a{
                text-align: center;
                font-size: 28px;
            }
            .nav-links a:hover{
                background-color: red;
            }
            .nav-links .nav-cta-button{
                padding: 30px 16px;
                margin-left: 0;
                border: none;
                border-radius: 0;
                margin-bottom: 20px;
            }
            .nav-links .nav-cta-button:hover{
                background-color: red;
            }
        }
    </style>
    {% if session.get('email') != None %}
    <nav>
        <div class="logo" >
            <a href="{{url_for('index')}}" style="text-decoration: none; color: white;"><h3>VelocityFlash</h3></a>
        </div>
        <div class="hamburger">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <ul class="nav-links">
            <li><a href="{{url_for('dashboard')}}">Dashboard</a></li>
            <li><a href="{{url_for('settings')}}">Settings</a></li>
            <li><a href="{{url_for('logout')}}">Logout</a></li>
        </ul>
    </nav>  
    {% else %}
    <nav>
        <div class="logo">
            <a href="{{url_for('index')}}"><h3>VelocityFlash</h3></a>
        </div>
        <div class="hamburger">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <ul class="nav-links">
            <li><a href="{{url_for('logout')}}">Login</a></li>
        </ul>
    </nav>
   
    {% endif %}
    
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    
    <div id="footer">
        {% block footer %}© 2026 VelocityFlash{% endblock %}
    </div>

 <script>
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        let menuOpen = false;
        hamburger.addEventListener('click', () => {
            if(menuOpen == false){
                navLinks.style.display = "block";
                menuOpen = true;
            } else if (menuOpen == true){
                navLinks.style.display = "none";
                menuOpen = false;
            }
        });

        window.addEventListener('resize', () => {
            if(window.innerWidth > 768)
            {
                navLinks.style.display = "flex";
                menuOpen = false;
            } else{
                navLinks.style.display = "none";
                menuOpen = false;
            }
        })
    </script> 
</body>
</html>
