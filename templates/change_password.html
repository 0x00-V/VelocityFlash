{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}

<style>
    .dashboard-main {
        max-width: 500px;
        margin: 0 auto;
        padding: 40px 16px;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    h1 {
        margin-bottom: 25px;
        text-align: center;
    }
    form {
        width: 100%;
        background: #2a2a2a;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.35);
    }
    label {
        display: block;
        margin-top: 12px;
        margin-bottom: 6px;
        font-size: 14px;
        opacity: 0.85;
    }
    input[type="password"] {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: none;
        outline: none;
        background: #1f1f1f;
        color: white;
    }
    input[type="submit"] {
        margin-top: 20px;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #39ffde;
        color: #111;
        font-weight: bold;
        cursor: pointer;
    }
    input[type="submit"]:hover {
        background: #2de0c4;
    }
    .error {
        color: #ff6b6b;
        margin-bottom: 10px;
        text-align: center;
    }
    @media (max-width: 600px) {
        form {
            padding: 18px;
        }
    }
</style>
<div class="dashboard-main">
    <h1>Update Password</h1>
    <form method="post">
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <label>Old Password</label>
        <input type="password" name="old_pass" required>
        <label>New Password</label>
        <input type="password" name="new_pass1" required>
        <label>Confirm Password</label>
        <input type="password" name="new_pass2" required>
        <input type="submit" value="Update Password">
    </form>
</div>
{% endblock %}
