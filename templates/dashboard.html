{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="dashboard-main">
    <a href="{{ url_for('new_deck') }}">
        <button>New Deck</button>
    </a>
<table>
  <tr>
    <th>Title</th>
    <th>Edit/Delete</th>
  </tr>
    {% if template_decks | length < 1 %}
        <tr><td>You currently have no decks.<td></tr>
    {% else %}
        {% for key, value in template_decks.items() %}
            <tr>
                <td><a href="{{url_for('deck', deck_id=key)}}">{{value}}</a></td>
                <td><a href="{{url_for('edit_deck', deck_id=key)}}">Edit</a><button type="button" onclick="deleteDeck('{{ url_for('delete_deck', deck_id=key) }}')">Delete Card</button>
</td>
            </tr>

        {% endfor %}
    {% endif %}
</table>
</div>
<script>
    function deleteDeck(url) {
    fetch(url, { method: "POST" })
        .then(() => location.reload());
    }
</script>
{% endblock %}
